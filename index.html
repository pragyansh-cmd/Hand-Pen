<!DOCTYPE html>
<html>
<head>
  <title>Hand-Pen AI ✨</title>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

  <style>
    body { margin: 0; background: #050301; overflow: hidden; font-family: sans-serif; }

    canvas {
      width: 100%;
      height: 100%;
      transform: scaleX(-1);
      position: absolute;
    }

    /* 🔥 TOP UI BAR */
    .toolbar {
      position: fixed;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      padding: 10px 20px;
      border-radius: 20px;
      display: flex;
      gap: 10px;
      z-index: 10;
      backdrop-filter: blur(10px);
    }

    button {
      border: none;
      padding: 8px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
    }

    .color {
      width: 25px;
      height: 25px;
      border-radius: 50%;
      cursor: pointer;
    }

    #size {
      width: 80px;
    }
  </style>
</head>

<body>

<video id="vid" style="display:none;"></video>
<canvas id="c"></canvas>

<!-- 🔥 TOOLBAR -->
<div class="toolbar">
  <div class="color" style="background:red" onclick="setColor('red')"></div>
  <div class="color" style="background:lime" onclick="setColor('lime')"></div>
  <div class="color" style="background:cyan" onclick="setColor('cyan')"></div>
  
  <input type="range" id="size" min="2" max="20" value="6" onchange="setSize(this.value)">
  
  <button onclick="clearCanvas()">Clear</button>
  <button onclick="saveImage()">Save</button>
</div>

<script>
var vid = document.getElementById('vid');
var c = document.getElementById('c');
var ctx = c.getContext('2d');

var arr = [];
var cur = [];
var draw = false;
var sx = null;
var sy = null;

var color = "#F5D061";
var brushSize = 6;

// 🎨 UI FUNCTIONS
function setColor(c) { color = c; }
function setSize(s) { brushSize = s; }
function clearCanvas() { arr = []; }
function saveImage() {
  let link = document.createElement('a');
  link.download = 'drawing.png';
  link.href = c.toDataURL();
  link.click();
}

// MAIN DRAW FUNCTION
function run(res) {
  c.width = window.innerWidth;
  c.height = window.innerHeight;

  ctx.drawImage(res.image, 0, 0, c.width, c.height);

  ctx.fillStyle = 'rgba(10,6,2,0.85)';
  ctx.fillRect(0, 0, c.width, c.height);

  ctx.shadowColor = color;
  ctx.shadowBlur = 15;
  ctx.strokeStyle = color;
  ctx.lineWidth = brushSize;
  ctx.lineCap = 'round';

  for (var i = 0; i < arr.length; i++) {
    ctx.beginPath();
    for (var j = 0; j < arr[i].length; j++) {
      if (j == 0) ctx.moveTo(arr[i][j].x, arr[i][j].y);
      else ctx.lineTo(arr[i][j].x, arr[i][j].y);
    }
    ctx.stroke();
  }

  if (res.multiHandLandmarks && res.multiHandLandmarks.length > 0) {
    var lm = res.multiHandLandmarks[0];

    drawConnectors(ctx, lm, HAND_CONNECTIONS, {color: 'rgba(255,255,255,0.2)'});
    drawLandmarks(ctx, lm, {color: '#fff', radius: 2});

    var ind = lm[8];
    var rx = ind.x * c.width;
    var ry = ind.y * c.height;

    if (sx == null) {
      sx = rx; 
      sy = ry;
    } else {
      sx += (rx - sx) * 0.4;
      sy += (ry - sy) * 0.4;
    }

    ctx.beginPath();
    ctx.arc(sx, sy, 6, 0, 2 * Math.PI);
    ctx.fillStyle = color;
    ctx.fill();

    // 👉 AUTO DRAW (no shift needed now)
    if (!draw) {
      draw = true;
      cur = [];
      arr.push(cur);
    }

    cur.push({x: sx, y: sy});

  } else {
    draw = false;
    sx = null;
  }
}

// MEDIAPIPE
var h = new Hands({
  locateFile: (file) => {
    return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
  }
});

h.setOptions({
  maxNumHands: 1,
  minDetectionConfidence: 0.7,
  minTrackingConfidence: 0.7
});

h.onResults(run);

// CAMERA
var cam = new Camera(vid, {
  onFrame: async () => {
    await h.send({image: vid});
  },
  width: 1280,
  height: 720
});

cam.start();
</script>

</body>
</html>
