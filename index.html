<!DOCTYPE html>
<html>
<head>
  <title>Hand-Pen</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <style>
    body { margin: 0; background: #050301; overflow: hidden; }
    video { display: none; }
    canvas { width: 100%; height: 100%; transform: scaleX(-1); position: absolute; }
  </style>
</head>
<body>

<video id="vid"></video>
<canvas id="c"></canvas>

<script>
var vid = document.getElementById('vid');
var c = document.getElementById('c');
var ctx = c.getContext('2d');

var arr = [];
var cur = [];
var draw = false;
var sx = null;
var sy = null;

// ✋ Finger count
function countFingers(lm) {
  let count = 0;

  if (lm[4].x < lm[3].x) count++; // thumb
  if (lm[8].y < lm[6].y) count++;
  if (lm[12].y < lm[10].y) count++;
  if (lm[16].y < lm[14].y) count++;
  if (lm[20].y < lm[18].y) count++;

  return count;
}

// 🔁 MAIN FUNCTION
function run(res) {
  c.width = window.innerWidth;
  c.height = window.innerHeight;

  ctx.drawImage(res.image, 0, 0, c.width, c.height);

  ctx.fillStyle = 'rgba(10, 6, 2, 0.85)';
  ctx.fillRect(0, 0, c.width, c.height);

  ctx.shadowColor = '#F5D061';
  ctx.shadowBlur = 15;
  ctx.strokeStyle = '#F5D061';
  ctx.lineWidth = 6;
  ctx.lineCap = 'round';

  // Draw previous lines
  for (var i = 0; i < arr.length; i++) {
    ctx.beginPath();
    for (var j = 0; j < arr[i].length; j++) {
      if (j == 0) ctx.moveTo(arr[i][j].x, arr[i][j].y);
      else ctx.lineTo(arr[i][j].x, arr[i][j].y);
    }
    ctx.stroke();
  }

  if (res.multiHandLandmarks && res.multiHandLandmarks.length > 0) {
    var lm = res.multiHandLandmarks[0];

    drawConnectors(ctx, lm, HAND_CONNECTIONS, {color: 'rgba(245, 208, 97, 0.3)'});
    drawLandmarks(ctx, lm, {color: '#fff', radius: 2});

    var ind = lm[8];
    var rx = ind.x * c.width;
    var ry = ind.y * c.height;

    // Smooth movement
    if (sx == null) {
      sx = rx; 
      sy = ry;
    } else {
      sx += (rx - sx) * 0.4;
      sy += (ry - sy) * 0.4;
    }

    // Cursor dot
    ctx.beginPath();
    ctx.arc(sx, sy, 6, 0, 2 * Math.PI);
    ctx.fillStyle = '#F5D061';
    ctx.fill();

    // 👉 Gesture Logic
    let fingerCount = countFingers(lm);

    if (fingerCount === 1) {
      if (!draw) {
        draw = true;
        cur = [];
        arr.push(cur);
      }
      cur.push({x: sx, y: sy});
    } else {
      draw = false;
    }

  } else {
    draw = false;
    sx = null;
  }
}

// MediaPipe setup
var h = new Hands({
  locateFile: (file) => {
    return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
  }
});

h.setOptions({
  maxNumHands: 1,
  minDetectionConfidence: 0.7,
  minTrackingConfidence: 0.7
});

h.onResults(run);

// Camera
var cam = new Camera(vid, {
  onFrame: async () => {
    await h.send({image: vid});
  },
  width: 1280,
  height: 720
});

cam.start();
</script>

</body>
</html>
