<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hand Pen AI</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
    }
    video, canvas {
      position: absolute;
      left: 0;
      top: 0;
    }
    #canvas {
      z-index: 2;
    }
    #video {
      transform: scaleX(-1);
    }
  </style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let prevX = 0, prevY = 0;

// Finger count function
function countFingers(landmarks) {
    let fingers = [];

    // Thumb
    if (landmarks[4].x < landmarks[3].x) fingers.push(1);
    else fingers.push(0);

    // Other fingers
    for (let i = 8; i <= 20; i += 4) {
        if (landmarks[i].y < landmarks[i - 2].y) fingers.push(1);
        else fingers.push(0);
    }

    return fingers.reduce((a, b) => a + b, 0);
}

// Gesture handler
function handleGesture(fingerCount, x, y) {

    if (fingerCount === 1) {
        // Draw
        ctx.strokeStyle = "lime";
        ctx.lineWidth = 5;
        ctx.beginPath();
        ctx.moveTo(prevX, prevY);
        ctx.lineTo(x, y);
        ctx.stroke();
    }

    else if (fingerCount === 2) {
        // Move only
        prevX = x;
        prevY = y;
    }

    else if (fingerCount === 3) {
        // Eraser
        ctx.clearRect(x - 20, y - 20, 40, 40);
    }

    else if (fingerCount === 5) {
        // Clear screen
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    prevX = x;
    prevY = y;
}

// MediaPipe Hands setup
const hands = new Hands({
    locateFile: (file) => {
        return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
    }
});

hands.setOptions({
    maxNumHands: 1,
    minDetectionConfidence: 0.7,
    minTrackingConfidence: 0.7
});

hands.onResults(results => {
    if (results.multiHandLandmarks.length > 0) {
        const landmarks = results.multiHandLandmarks[0];

        let fingerCount = countFingers(landmarks);

        let x = landmarks[8].x * canvas.width;
        let y = landmarks[8].y * canvas.height;

        handleGesture(fingerCount, x, y);
    }
});

// Camera setup
const camera = new Camera(video, {
    onFrame: async () => {
        await hands.send({ image: video });
    },
    width: 640,
    height: 480
});

camera.start();
</script>

</body>
</html>
